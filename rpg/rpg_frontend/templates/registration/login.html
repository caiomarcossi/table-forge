{% extends "rpg_frontend/base.html" %}

{% block title %}Entrar{% endblock %}
{% block meta_description %}Faça login no Table Forge{% endblock %}

{% block content %}
<h1>Entrar</h1>

{% if form.errors %}
	<p class="error">Usuário ou senha inválidos.</p>
{% endif %}

<form method="post" action="{% url 'login' %}">
	{% csrf_token %}
	<div class="field">
		<label for="username">Usuário</label>
		<input type="text" name="username" id="username" required>
	</div>
	<div class="field">
		<label for="password">Senha</label>
		<input type="password" name="password" id="password" required>
	</div>
	<button class="btn" type="submit">Entrar</button>
</form>

<p class="muted">Não tem conta? <a href="{% url 'signup' %}">Criar conta</a>.</p>
{% endblock %}
