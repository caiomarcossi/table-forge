{%extends "base.html"%}

{%block title%}Entrar{%endblock%}
{%block meta_description%}Página de login do Table Forge{%endblock%}
{%block extra_head%}
<link rel="canonical" href="https://www.ck-corporation.com.br/rpg">
{%endblock%}

{%block content%}
<main class="auth-container">
<header>
<h1>Página de login</h1>
</header>

<section class="card">
{% if form.errors %}
<p class="roll-fail">Usuário ou senha inválidos.</p>
{% endif %}

<form method="post">
{% csrf_token %}
<div class="form-group">
<label for="username">Usuário</label><br>
<input type="text" name="username" id="username" required>
</div>
<div class="form-group">
<label for="password">Senha</label><br>
<input type="password" name="password" id="password" required>
</div>
<button class="btn btn-full" type="submit">Entrar</button>
</form>
</section>
</main>
{%endblock%}
